<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Callback — Real Estate Mobile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .phone {
            background: white;
            border-radius: 40px;
            width: 360px;
            padding: 36px 28px 36px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.3);
        }
        .notch {
            width: 80px; height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin: 0 auto 28px;
        }

        /* Loading state */
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Success state */
        .avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        h2 { font-size: 20px; color: #1e293b; text-align: center; margin-bottom: 4px; }
        .email { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 24px; }

        .section { margin-bottom: 16px; }
        .section-label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            background: #ede9fe;
            color: #5b21b6;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }
        .chip.green {
            background: #dcfce7;
            color: #15803d;
        }

        .org-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #475569;
            word-break: break-all;
        }

        .token-box {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            font-size: 11px;
            color: #7dd3fc;
            overflow-x: auto;
            line-height: 1.5;
            margin-top: 6px;
            max-height: 120px;
            overflow-y: auto;
        }

        .btn-logout {
            width: 100%;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-logout:hover { background: #e2e8f0; }

        /* Error state */
        .error-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
        .error-msg  { font-size: 14px; color: #ef4444; text-align: center; }

        .hidden { display: none; }
        #viewLoading, #viewSuccess, #viewError { }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>

        <!-- Loading -->
        <div id="viewLoading">
            <div class="spinner"></div>
            <p style="text-align:center;color:#64748b;font-size:14px">Đang xác thực...</p>
        </div>

        <!-- Success -->
        <div id="viewSuccess" class="hidden">
            <div class="avatar" id="avatarLetter">U</div>
            <h2 id="userName">Welcome</h2>
            <p class="email" id="userEmail">—</p>

            <div class="section">
                <div class="section-label">Organization ID</div>
                <div class="org-box" id="orgId">—</div>
            </div>

            <div class="section">
                <div class="section-label">Roles</div>
                <div class="chip-row" id="rolesRow"></div>
            </div>

            <div class="section">
                <div class="section-label">Token Claims (id_token)</div>
                <pre class="token-box" id="claimsBox"></pre>
            </div>

            <button class="btn-logout" onclick="logout()">Đăng xuất</button>
        </div>

        <!-- Error -->
        <div id="viewError" class="hidden">
            <div class="error-icon">⚠️</div>
            <p class="error-msg" id="errorMsg">Đã có lỗi xảy ra</p>
            <button class="btn-logout" onclick="location.href='/'">Thử lại</button>
        </div>
    </div>

    <script>
    const TOKEN_ENDPOINT = 'http://localhost:8080/oauth2/token';
    const CLIENT_ID      = 'realestate-mobile-client';
    const REDIRECT_URI   = 'http://localhost:8082/callback.html';

    function show(id) {
        ['viewLoading', 'viewSuccess', 'viewError'].forEach(v => {
            document.getElementById(v).classList.toggle('hidden', v !== id);
        });
    }

    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
        show('viewError');
    }

    async function handleCallback() {
        const params   = new URLSearchParams(window.location.search);
        const code     = params.get('code');
        const error    = params.get('error');
        const state    = params.get('state');
        const verifier = sessionStorage.getItem('pkce_verifier');
        const saved    = sessionStorage.getItem('pkce_state');

        if (error) {
            showError('OAuth error: ' + error + ' — ' + (params.get('error_description') || ''));
            return;
        }
        if (!code)     { showError('No authorization code received.'); return; }
        if (!verifier) { showError('PKCE verifier missing from session storage.'); return; }
        if (state !== saved) { showError('State mismatch — possible CSRF attack.'); return; }

        sessionStorage.removeItem('pkce_verifier');
        sessionStorage.removeItem('pkce_state');

        // Exchange code → token (no client_secret — public PKCE client)
        let tokenData;
        try {
            const resp = await fetch(TOKEN_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    grant_type:    'authorization_code',
                    code,
                    redirect_uri:  REDIRECT_URI,
                    client_id:     CLIENT_ID,
                    code_verifier: verifier,
                    // ← no client_secret here!
                }),
            });
            tokenData = await resp.json();
            if (!resp.ok) throw new Error(tokenData.error_description || tokenData.error);
        } catch (e) {
            showError('Token exchange failed: ' + e.message);
            return;
        }

        // Decode id_token claims
        const claims = decodeJwt(tokenData.id_token || tokenData.access_token);
        renderSuccess(claims, tokenData);
    }

    function decodeJwt(token) {
        try {
            const payload = token.split('.')[1];
            return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
        } catch { return {}; }
    }

    function renderSuccess(claims, tokenData) {
        const name  = claims.name  || claims.email || 'User';
        const email = claims.email || '—';

        document.getElementById('avatarLetter').textContent = name.charAt(0).toUpperCase();
        document.getElementById('userName').textContent     = 'Welcome, ' + name + '!';
        document.getElementById('userEmail').textContent    = email;
        document.getElementById('orgId').textContent        = claims.org_id || '(not set)';

        const rolesRow = document.getElementById('rolesRow');
        const roles    = claims.roles || [];
        rolesRow.innerHTML = roles.length
            ? roles.map(r => `<span class="chip">${r}</span>`).join('')
            : '<span style="color:#94a3b8;font-size:12px">none</span>';

        // Pretty-print key claims
        const display = {
            sub:         claims.sub,
            email:       claims.email,
            org_id:      claims.org_id,
            roles:       claims.roles,
            permissions: claims.permissions,
            iat:         claims.iat ? new Date(claims.iat * 1000).toISOString() : undefined,
            exp:         claims.exp ? new Date(claims.exp * 1000).toISOString() : undefined,
        };
        document.getElementById('claimsBox').textContent = JSON.stringify(display, null, 2);

        show('viewSuccess');
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = '/';
    }

    // Run on page load
    handleCallback();
    </script>
</body>
</html>
