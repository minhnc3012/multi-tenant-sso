spring:
  application:
    name: parking-admin

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/parking_admin
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── OAuth2 SSO via Identity Platform ──────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          identity-platform:
            client-id: parking-admin-web-client
            client-secret: ${PARKING_ADMIN_WEB_CLIENT_SECRET:parking-admin-web-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
        provider:
          identity-platform:
            issuer-uri: ${IDP_ISSUER_URI:http://localhost:8080}

server:
  port: 8095

# ── IDP Client SDK ────────────────────────────────────────────────────────────
idp:
  client:
    base-url: ${IDP_BASE_URL:http://localhost:8080}
    management-base-url: ${IDP_MANAGEMENT_BASE_URL:http://localhost:8081}
    client-id: parking-admin-api-client
    client-secret: ${PARKING_ADMIN_API_CLIENT_SECRET:parking-admin-api-secret}
    org-slug: ${IDP_ORG_SLUG:kerb}

logging:
  level:
    com.kerb: DEBUG
    org.springframework.security: INFO
