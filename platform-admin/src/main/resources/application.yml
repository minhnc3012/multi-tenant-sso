server:
  port: 8090

spring:
  application:
    name: platform-admin

  threads:
    virtual:
      enabled: true   # Project Loom — I/O-bound proxy workload benefits significantly

  thymeleaf:
    cache: false

  security:
    oauth2:
      client:
        registration:
          identity-platform:
            client-id: platform-admin-client
            client-secret: platform-admin-secret
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8090/login/oauth2/code/identity-platform"
        provider:
          identity-platform:
            authorization-uri: http://localhost:8080/oauth2/authorize
            token-uri: http://localhost:8080/oauth2/token
            jwk-set-uri: http://localhost:8080/oauth2/jwks
            user-info-uri: http://localhost:8080/userinfo
            user-name-attribute: sub

  cloud:
    gateway:
      mvc:
        routes:
          # Management API (admin-service) - users, orgs, roles, registered-clients, audit-logs
          - id: admin-api
            uri: ${services.admin-api.base-url}
            predicates:
              - Path=/api/v1/users/**, /api/v1/organizations/**, /api/v1/roles/**, /api/v1/registered-clients/**, /api/v1/audit-logs/**
            filters:
              - TokenRelay=
              - AddRequestHeader=X-Organization-Slug, platform

          # Authentication API (auth-server) - session/token-bound endpoints
          - id: auth-api
            uri: ${services.auth-server.base-url}
            predicates:
              - Path=/api/v1/auth/**
            filters:
              - TokenRelay=
              - AddRequestHeader=X-Organization-Slug, platform

services:
  admin-api:
    base-url: http://localhost:8081
  auth-server:
    base-url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health
