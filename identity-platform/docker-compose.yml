version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: identity-platform-db
    environment:
      POSTGRES_DB: identity_platform
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: identity-platform-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: identity-platform-mail
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI để xem email trong dev
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
