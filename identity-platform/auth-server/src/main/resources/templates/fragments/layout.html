<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Identity Platform'">Identity Platform</title>
    <!-- CSRF for JS fetch calls -->
    <meta name="_csrf"        th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <!-- Org context for API calls -->
    <meta name="org-slug"          th:content="${orgSlug}">
    <meta name="org-name"          th:content="${orgName}">
    <meta name="is-platform-admin" th:content="${isPlatformAdmin}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar { width: 240px; min-height: 100vh; background: #1e1e2e; }
        .sidebar .nav-link { color: #cdd6f4; border-radius: 8px; margin: 2px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #313244; color: #cba6f7; }
        .sidebar .nav-link i { width: 20px; }
        .sidebar-brand { color: #cba6f7; font-weight: 700; font-size: 1.1rem; }
        .main-content { flex: 1; padding: 2rem; overflow-x: auto; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .badge-role { font-size: .7rem; }
        .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; color: #6c757d; }
        .btn-action { padding: 3px 8px; font-size: .8rem; }
    </style>
</head>

<nav th:fragment="sidebar" class="sidebar d-flex flex-column py-3">
    <a class="sidebar-brand d-flex align-items-center gap-2 px-3 mb-4 text-decoration-none" href="/">
        <i class="bi bi-shield-lock-fill fs-4"></i>
        <span>Identity Platform</span>
    </a>
    <ul class="nav flex-column gap-1">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentPage == 'users'} ? 'active'" href="/admin/users">
                <i class="bi bi-people me-2"></i>Users
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentPage == 'organizations'} ? 'active'" href="/admin/organizations">
                <i class="bi bi-building me-2"></i>Organizations
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentPage == 'roles'} ? 'active'" href="/admin/roles">
                <i class="bi bi-tag me-2"></i>Roles
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentPage == 'clients'} ? 'active'" href="/admin/clients">
                <i class="bi bi-key me-2"></i>OAuth2 Clients
            </a>
        </li>
    </ul>
    <div class="mt-auto px-3 pb-2">
        <div class="d-flex align-items-center gap-2 mb-2">
            <i class="bi bi-person-circle text-secondary"></i>
            <small class="text-secondary" th:text="${userEmail}">user@example.com</small>
        </div>
        <form th:action="@{/logout}" method="post" class="d-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-left me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<script th:fragment="common-js">
    // Shared utilities for all admin pages
    const ORG_SLUG          = document.querySelector('meta[name="org-slug"]')?.content ?? '';
    const CSRF_TOKEN        = document.querySelector('meta[name="_csrf"]')?.content ?? '';
    const CSRF_HDR          = document.querySelector('meta[name="_csrf_header"]')?.content ?? 'X-CSRF-TOKEN';
    const IS_PLATFORM_ADMIN = document.querySelector('meta[name="is-platform-admin"]')?.content === 'true';

    function apiHeaders(extra = {}) {
        return {
            'Content-Type': 'application/json',
            'X-Organization-Slug': ORG_SLUG,
            [CSRF_HDR]: CSRF_TOKEN,
            ...extra
        };
    }

    async function apiFetch(url, opts = {}) {
        const res = await fetch(url, {
            headers: apiHeaders(opts.headers),
            ...opts
        });
        if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.detail || body.message || `HTTP ${res.status}`);
        }
        return res.status === 204 ? null : res.json();
    }

    function showToast(msg, type = 'success') {
        const id = 'toast-' + Date.now();
        document.body.insertAdjacentHTML('beforeend', `
            <div id="${id}" class="toast align-items-center text-bg-${type} border-0 position-fixed bottom-0 end-0 m-3"
                 role="alert" style="z-index:9999">
              <div class="d-flex">
                <div class="toast-body">${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
              </div>
            </div>`);
        const el = document.getElementById(id);
        new bootstrap.Toast(el, { delay: 3000 }).show();
        el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    function showError(msg) { showToast(msg, 'danger'); }
</script>
</html>
