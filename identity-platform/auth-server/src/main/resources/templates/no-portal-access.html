<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không có quyền truy cập — Identity Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 100%;
            max-width: 460px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card-body { padding: 2.5rem; }
        .icon-wrap {
            width: 64px; height: 64px;
            background: #fff3cd;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.75rem;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-body text-center">
        <div class="icon-wrap">&#128683;</div>
        <h5 class="fw-bold mb-1">Không có quyền truy cập</h5>
        <p class="text-muted small mb-3">
            Cổng quản trị này dành riêng cho <strong>Platform Administrator</strong>.<br>
            Tài khoản <span class="fw-semibold" th:text="${userEmail}">bạn</span>
            thuộc về một tổ chức (tenant) — vui lòng sử dụng ứng dụng của tổ chức.
        </p>
        <hr class="my-3">
        <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                &#8592; Đăng xuất
            </button>
        </form>
    </div>
</div>
</body>
</html>
