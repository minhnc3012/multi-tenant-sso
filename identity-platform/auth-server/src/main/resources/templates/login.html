<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Identity Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card .card-body { padding: 2.5rem; }
        .brand-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem; color: white;
        }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,.25); }
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 8px; padding: 0.65rem;
            font-weight: 600; letter-spacing: 0.3px;
        }
        .btn-login:hover { opacity: 0.92; }
        /* Auto-detected domain badge */
        .detected-badge {
            font-size: .7rem;
            background: #d1e7dd;
            color: #0a3622;
            padding: 1px 6px;
            border-radius: 4px;
            display: none;
        }
        .input-detected { background-color: #f8fff9 !important; }
    </style>
</head>
<body>
<div class="login-card card">
    <div class="card-body">
        <div class="text-center mb-4">
            <div class="brand-logo">&#128274;</div>
            <h4 class="fw-bold mb-1">Đăng nhập</h4>
            <p class="text-muted small mb-0">Identity Platform</p>
        </div>

        <div th:if="${logoutMessage}" class="alert alert-success py-2 small" th:text="${logoutMessage}"></div>
        <div th:if="${errorMessage}"  class="alert alert-danger  py-2 small" th:text="${errorMessage}"></div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>

            <!-- Domain / Organization field -->
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="org-slug" class="form-label fw-semibold small mb-0">Domain</label>
                    <span id="detectedBadge" class="detected-badge">&#10003; Tự động nhận diện</span>
                </div>
                <input type="text" id="org-slug" name="org-slug"
                       class="form-control" placeholder="platform, realestate-corp, acme…"
                       autocomplete="organization" spellcheck="false" required>
                <div class="form-text text-muted" style="font-size:.75rem">
                    Slug của tổ chức bạn thuộc về (ví dụ: <code>platform</code>)
                </div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold small">Email</label>
                <input type="email" id="username" name="username"
                       class="form-control" placeholder="you@company.com"
                       required autocomplete="email" autofocus>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label for="password" class="form-label fw-semibold small mb-0">Mật khẩu</label>
                    <a href="/api/v1/users/password/reset-request" class="text-decoration-none small text-muted">
                        Quên mật khẩu?
                    </a>
                </div>
                <input type="password" id="password" name="password"
                       class="form-control mt-1" placeholder="••••••••"
                       required autocomplete="current-password">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                <label class="form-check-label small" for="remember-me">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100 text-white">
                Đăng nhập
            </button>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
            <p class="text-muted small mb-0">
                Chưa có tài khoản? Liên hệ quản trị viên để được mời tham gia.
            </p>
        </div>
    </div>
</div>

<script>
(function () {
    /**
     * Attempts to detect the org slug from:
     *   1. URL query param  ?org=xxx  or  ?domain=xxx
     *   2. Subdomain:       acme.yourplatform.com  →  "acme"
     *
     * Returns the detected slug string, or null if nothing was found.
     */
    function detectOrgSlug() {
        // 1. Query params — highest priority (explicit link with org context)
        var params = new URLSearchParams(window.location.search);
        var qp = params.get('org') || params.get('domain') || params.get('org-slug');
        if (qp && qp.trim()) return qp.trim().toLowerCase();

        // 2. Subdomain — works in production multi-tenant setup
        var hostname = window.location.hostname;          // e.g. "acme.yourplatform.com"
        var parts    = hostname.split('.');
        // Need at least 2 parts and the first part must not be a known system segment
        var reserved = ['www', 'auth', 'localhost', 'app', 'api'];
        if (parts.length >= 2 && !reserved.includes(parts[0])) {
            return parts[0].toLowerCase();
        }

        return null;
    }

    var slug  = detectOrgSlug();
    var field = document.getElementById('org-slug');
    var badge = document.getElementById('detectedBadge');

    if (slug && field) {
        field.value = slug;
        field.classList.add('input-detected');
        if (badge) badge.style.display = 'inline';

        // Move focus to email field since domain is already filled
        var emailField = document.getElementById('username');
        if (emailField) emailField.focus();
    }
})();
</script>
</body>
</html>
