<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('OAuth2 Clients')}"></head>
<body class="d-flex">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold">OAuth2 Registered Clients</h4>
            <small class="text-muted">PLATFORM_ADMIN only</small>
        </div>
        <button class="btn btn-primary" onclick="showCreateModal()">
            <i class="bi bi-plus-lg me-1"></i>Add Client
        </button>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="ps-3">Client ID</th>
                        <th>Client Name</th>
                        <th>Grant Types</th>
                        <th>Redirect URIs</th>
                        <th>Scopes</th>
                        <th class="pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody id="clientsTable"></tbody>
            </table>
        </div>
    </div>
</main>

<!-- Create Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Add OAuth2 Client</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="mb-3"><label class="form-label small fw-semibold">Client ID *</label>
                <input id="c-clientId" class="form-control" placeholder="my-app"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Client Name *</label>
                <input id="c-clientName" class="form-control" placeholder="My Application"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Client Secret *</label>
                <input id="c-clientSecret" class="form-control" type="password"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Redirect URIs</label>
                <input id="c-redirectUris" class="form-control" placeholder="https://myapp.com/callback"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Scopes</label>
                <input id="c-scopes" class="form-control" value="openid,profile,email"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Grant Types</label>
                <input id="c-grantTypes" class="form-control" value="authorization_code,refresh_token"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Auth Methods</label>
                <input id="c-authMethods" class="form-control" value="client_secret_basic"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" onclick="createClient()">Create</button>
        </div>
    </div></div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Edit Client</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="e-id">
            <div class="mb-3"><label class="form-label small fw-semibold">Client Name</label>
                <input id="e-clientName" class="form-control"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Redirect URIs</label>
                <input id="e-redirectUris" class="form-control"></div>
            <div class="mb-3"><label class="form-label small fw-semibold">Scopes</label>
                <input id="e-scopes" class="form-control"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" onclick="updateClient()">Save</button>
        </div>
    </div></div>
</div>

<!-- Rotate Secret Modal -->
<div class="modal fade" id="secretModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Rotate Client Secret</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="s-id">
            <div class="mb-3"><label class="form-label small fw-semibold">New Secret *</label>
                <input id="s-newSecret" class="form-control" type="password"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-warning" onclick="rotateSecret()">Rotate</button>
        </div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/layout :: common-js}"></script>
<script>
const API = '/api/v1/registered-clients';

async function loadClients() {
    try {
        const clients = await apiFetch(API);
        renderTable(clients);
    } catch (e) { showError('Failed to load clients: ' + e.message); }
}

function renderTable(clients) {
    const tbody = document.getElementById('clientsTable');
    if (!clients.length) { tbody.innerHTML='<tr><td colspan="6" class="text-center py-4 text-muted">No clients</td></tr>'; return; }
    tbody.innerHTML = clients.map(c => `
        <tr>
            <td class="ps-3"><strong>${c.client_id}</strong></td>
            <td>${c.client_name}</td>
            <td>${badges(c.authorization_grant_types,'secondary')}</td>
            <td>${c.redirect_uris ? c.redirect_uris.split(',').map(u=>`<code class="small">${u.trim()}</code>`).join(' ') : '—'}</td>
            <td>${badges(c.scopes,'info')}</td>
            <td class="pe-3">
                <button class="btn btn-outline-primary btn-action me-1" onclick="fillEdit('${c.id}','${c.client_name}','${c.redirect_uris??''}','${c.scopes??''}')">Edit</button>
                <button class="btn btn-outline-warning btn-action me-1" onclick="showSecret('${c.id}')">Rotate Key</button>
                <button class="btn btn-outline-danger btn-action" onclick="deleteClient('${c.id}','${c.client_id}')">Delete</button>
            </td>
        </tr>`).join('');
}

function badges(str, color) {
    if (!str) return '—';
    return str.split(',').map(s => `<span class="badge bg-${color} badge-role">${s.trim()}</span>`).join(' ');
}

function showCreateModal() { new bootstrap.Modal(document.getElementById('createModal')).show(); }

async function createClient() {
    const clientId = document.getElementById('c-clientId').value.trim();
    const clientName = document.getElementById('c-clientName').value.trim();
    const clientSecret = document.getElementById('c-clientSecret').value.trim();
    if (!clientId || !clientName || !clientSecret) { showError('Client ID, Name and Secret are required'); return; }
    try {
        await apiFetch(API, { method:'POST', body: JSON.stringify({
            clientId, clientName, clientSecret,
            redirectUris: document.getElementById('c-redirectUris').value.trim(),
            scopes: document.getElementById('c-scopes').value.trim(),
            authorizationGrantTypes: document.getElementById('c-grantTypes').value.trim(),
            clientAuthenticationMethods: document.getElementById('c-authMethods').value.trim()
        })});
        bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
        showToast('Client created'); loadClients();
    } catch (e) { showError(e.message); }
}

function fillEdit(id, name, uris, scopes) {
    document.getElementById('e-id').value = id;
    document.getElementById('e-clientName').value = name;
    document.getElementById('e-redirectUris').value = uris;
    document.getElementById('e-scopes').value = scopes;
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

async function updateClient() {
    const id = document.getElementById('e-id').value;
    try {
        await apiFetch(`${API}/${id}`, { method:'PUT', body: JSON.stringify({
            clientName: document.getElementById('e-clientName').value.trim(),
            redirectUris: document.getElementById('e-redirectUris').value.trim(),
            scopes: document.getElementById('e-scopes').value.trim()
        })});
        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
        showToast('Client updated'); loadClients();
    } catch (e) { showError(e.message); }
}

function showSecret(id) {
    document.getElementById('s-id').value = id;
    new bootstrap.Modal(document.getElementById('secretModal')).show();
}

async function rotateSecret() {
    const id = document.getElementById('s-id').value;
    const newSecret = document.getElementById('s-newSecret').value.trim();
    if (!newSecret) { showError('New secret is required'); return; }
    try {
        await apiFetch(`${API}/rotate-secret/${id}`, { method:'POST', body: JSON.stringify({ newSecret }) });
        bootstrap.Modal.getInstance(document.getElementById('secretModal')).hide();
        showToast('Secret rotated'); loadClients();
    } catch (e) { showError(e.message); }
}

async function deleteClient(id, clientId) {
    if (!confirm(`Delete client "${clientId}"?`)) return;
    try { await apiFetch(`${API}/${id}`, { method:'DELETE' });
          showToast('Client deleted'); loadClients(); }
    catch (e) { showError(e.message); }
}

loadClients();
</script>
</body>
</html>
