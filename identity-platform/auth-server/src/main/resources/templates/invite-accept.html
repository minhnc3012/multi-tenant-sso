<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấp nhận lời mời — Identity Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            width: 100%; max-width: 440px;
            border: none; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card-body { padding: 2.5rem; }
        .brand-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem; color: white;
        }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,.25); }
        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 8px; padding: 0.65rem;
            font-weight: 600;
        }
        #strengthBar { height: 4px; border-radius: 2px; transition: width .3s, background .3s; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-body">
        <div class="text-center mb-4">
            <div class="brand-logo">&#127881;</div>
            <h4 class="fw-bold mb-1">Bạn được mời!</h4>
            <p class="text-muted small">Thiết lập mật khẩu để bắt đầu sử dụng</p>
        </div>

        <div id="alertBox" class="d-none alert py-2 small"></div>

        <form id="acceptForm">
            <input type="hidden" id="token" th:value="${token}">

            <div class="mb-3">
                <label class="form-label fw-semibold small">Mật khẩu mới</label>
                <input type="password" id="password" class="form-control"
                       placeholder="Tối thiểu 8 ký tự" required minlength="8"
                       oninput="checkStrength(this.value)">
                <div class="mt-1 bg-light rounded">
                    <div id="strengthBar" style="width:0%;background:#dc3545"></div>
                </div>
                <small id="strengthText" class="text-muted"></small>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold small">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" class="form-control"
                       placeholder="Nhập lại mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-primary btn-submit w-100 text-white">
                Tạo tài khoản
            </button>
        </form>
    </div>
</div>

<script>
function checkStrength(pw) {
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const bar = document.getElementById('strengthBar');
    const text = document.getElementById('strengthText');
    const colors = ['#dc3545','#fd7e14','#ffc107','#198754'];
    const labels = ['Yếu','Trung bình','Khá','Mạnh'];
    bar.style.width = (score * 25) + '%';
    bar.style.background = colors[score - 1] || '#dc3545';
    text.textContent = pw.length ? labels[score - 1] || '' : '';
}

function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type} py-2 small`;
    box.textContent = msg;
    box.classList.remove('d-none');
}

document.getElementById('acceptForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const token = document.getElementById('token').value;

    if (password !== confirm) {
        showAlert('Mật khẩu xác nhận không khớp.', 'danger');
        return;
    }
    if (password.length < 8) {
        showAlert('Mật khẩu phải có ít nhất 8 ký tự.', 'danger');
        return;
    }

    try {
        const res = await fetch('/api/v1/users/invite/accept', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ token, password })
        });

        if (res.ok) {
            showAlert('Tài khoản đã được tạo! Đang chuyển hướng...', 'success');
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            const err = await res.json().catch(() => ({}));
            showAlert(err.detail || 'Token không hợp lệ hoặc đã hết hạn.', 'danger');
        }
    } catch {
        showAlert('Lỗi kết nối. Vui lòng thử lại.', 'danger');
    }
});
</script>
</body>
</html>
