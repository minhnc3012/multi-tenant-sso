spring:
  application:
    name: identity-platform

  threads:
    virtual:
      enabled: true   # Project Loom: handles I/O-bound OAuth2/OIDC flows efficiently

  thymeleaf:
    cache: false

  datasource:
    url: jdbc:postgresql://localhost:5433/identity_platform
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  session:
    store-type: redis
    timeout: 30m

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  forward-headers-strategy: framework  # Quan trọng nếu chạy sau reverse proxy

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.identityplatform: DEBUG
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG

# ── Application-level configuration ──────────────────────────────────────────
# All sensitive values should be supplied via environment variables in production.
# The defaults here are safe only for local development.
app:
  auth:
    # JWT issuer claim — must match the public URL of the auth-server.
    # Override: AUTH_SERVER_ISSUER=https://auth.yourcompany.com
    issuer: ${AUTH_SERVER_ISSUER:http://localhost:8080}

  oauth2:
    secrets:
      # Client secrets seeded on first startup. Changing these after initial seed
      # requires a manual DB UPDATE on oauth2_registered_client.
      platform-admin:    ${PLATFORM_ADMIN_CLIENT_SECRET:platform-admin-secret}
      swagger:           ${SWAGGER_CLIENT_SECRET:swagger-secret}
      realestate-web:    ${REALESTATE_WEB_CLIENT_SECRET:realestate-web-secret}
      realestate-api:    ${REALESTATE_API_CLIENT_SECRET:realestate-api-secret}
      parking-admin-web: ${PARKING_ADMIN_WEB_CLIENT_SECRET:parking-admin-web-secret}
      parking-admin-api: ${PARKING_ADMIN_API_CLIENT_SECRET:parking-admin-api-secret}

  cors:
    # Comma-separated list of allowed CORS origins.
    # Override: CORS_ALLOWED_ORIGINS=https://app.yourcompany.com,https://admin.yourcompany.com
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:8090,http://localhost:8095}

  seed:
    # Initial admin and demo passwords — used ONLY when the user does not yet exist.
    # Changing these env vars after initial deployment has no effect (update via API instead).
    admin-password: ${ADMIN_PASSWORD:admin}
