<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — Real Estate Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
        }
        header {
            background: #4f46e5;
            color: white;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-brand { font-size: 18px; font-weight: 700; }
        .header-user  { font-size: 14px; opacity: 0.85; }
        .logout-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 12px;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.25); }

        main { max-width: 900px; margin: 40px auto; padding: 0 24px; }

        .welcome-card {
            background: white;
            border-radius: 12px;
            padding: 32px 36px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.07);
            margin-bottom: 24px;
        }
        .welcome-card h2 { font-size: 24px; color: #1e293b; margin-bottom: 6px; }
        .welcome-card p  { color: #64748b; font-size: 15px; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .info-card {
            background: white;
            border-radius: 10px;
            padding: 20px 24px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .info-card .label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
        .info-card .value { font-size: 14px; color: #334155; word-break: break-all; }

        .tag {
            display: inline-block;
            background: #ede9fe;
            color: #5b21b6;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
            margin: 2px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            text-align: center;
        }
        .stat-card .number { font-size: 32px; font-weight: 700; color: #4f46e5; }
        .stat-card .desc   { font-size: 13px; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
    <header>
        <span class="header-brand">🏠 Real Estate Management</span>
        <div>
            <span class="header-user" th:text="${email}">user@example.com</span>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <button class="logout-btn" type="submit">Đăng xuất</button>
            </form>
        </div>
    </header>

    <main>
        <!-- Welcome -->
        <div class="welcome-card">
            <h2>Welcome, <span th:text="${name}">User</span>!</h2>
            <p>Chào mừng bạn đến với hệ thống quản lý bất động sản. Bạn đã đăng nhập thành công qua Identity Platform.</p>
        </div>

        <!-- User info from JWT claims -->
        <div class="info-grid">
            <div class="info-card">
                <div class="label">Email</div>
                <div class="value" th:text="${email}">—</div>
            </div>
            <div class="info-card">
                <div class="label">Organization ID</div>
                <div class="value" th:text="${orgId} ?: 'N/A'">—</div>
            </div>
            <div class="info-card">
                <div class="label">Roles</div>
                <div class="value">
                    <span th:each="role : ${roles}" th:text="${role}" class="tag">ROLE</span>
                    <span th:if="${#lists.isEmpty(roles)}" style="color:#94a3b8">—</span>
                </div>
            </div>
            <div class="info-card">
                <div class="label">Permissions</div>
                <div class="value">
                    <span th:each="perm : ${permissions}" th:text="${perm}" class="tag">perm</span>
                    <span th:if="${#lists.isEmpty(permissions)}" style="color:#94a3b8">—</span>
                </div>
            </div>
        </div>

        <!-- Placeholder stats -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="number">128</div>
                <div class="desc">Bất động sản</div>
            </div>
            <div class="stat-card">
                <div class="number">34</div>
                <div class="desc">Giao dịch tháng này</div>
            </div>
            <div class="stat-card">
                <div class="number">12</div>
                <div class="desc">Khách hàng mới</div>
            </div>
        </div>
    </main>
</body>
</html>
