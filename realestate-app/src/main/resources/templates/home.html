<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Real Estate Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 480px;
            width: 100%;
        }
        .logo { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 28px; color: #1e293b; margin-bottom: 8px; }
        p  { color: #64748b; margin-bottom: 32px; font-size: 15px; }
        .btn-login {
            display: inline-block;
            background: #4f46e5;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #4338ca; }
        .footer { margin-top: 24px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">🏠</div>
        <h1>Real Estate Management</h1>
        <p>Quản lý bất động sản toàn diện cho doanh nghiệp của bạn</p>
        <a href="/oauth2/authorization/identity-platform" class="btn-login">
            Đăng nhập
        </a>
        <div class="footer">Powered by Identity Platform · SSO</div>
    </div>
</body>
</html>
